# Consistent structured logging across the NBA services (slf4j-simple backend).
# Line shape:  <ISO-8601 ts> [LEVEL] <logger> - <message>
# Hot-path messages use logfmt key=value fields (e.g. event=hotpath nbaId=.. elig_ms=3 total_ms=8)
# so the line is both human-readable and machine-parseable.
org.slf4j.simpleLogger.logFile=System.out
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd'T'HH:mm:ss.SSSXXX
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.showShortLogName=false
org.slf4j.simpleLogger.levelInBrackets=true
org.slf4j.simpleLogger.defaultLogLevel=info
# Quiet the chatty infrastructure libraries so the NBA signal stands out.
org.slf4j.simpleLogger.log.org.apache.kafka=warn
org.slf4j.simpleLogger.log.org.apache.kafka.clients.NetworkClient=error
org.slf4j.simpleLogger.log.io.javalin=warn
org.slf4j.simpleLogger.log.org.eclipse.jetty=warn
org.slf4j.simpleLogger.log.io.temporal=warn
org.slf4j.simpleLogger.log.com.zaxxer.hikari=warn
