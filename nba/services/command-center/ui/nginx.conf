server {
    listen 80;
    server_name _;

    # GraphQL → BFF (Apollo is mounted at /graphql). Variable + resolver forces runtime DNS
    # so a BFF restart doesn't leave a stale upstream IP cached. No trailing slash on proxy_pass
    # so the /graphql path is preserved (a trailing slash would rewrite it to / -> "Cannot POST /").
    location /graphql {
        resolver 10.89.0.1 valid=30s ipv6=off;
        set $bff http://nba-bff:4000;
        proxy_pass $bff;
        proxy_set_header Host $host;
        proxy_set_header Content-Type $content_type;
    }

    # BFF REST endpoints the System Map / live views use (NOT GraphQL): topology, per-node peek,
    # live stats. Without these they fall through to the SPA and break ("Unexpected token '<'").
    location ~ ^/(topology|recent|livestats)(/|$) {
        resolver 10.89.0.1 valid=30s ipv6=off;
        set $bff http://nba-bff:4000;
        proxy_pass $bff;
        proxy_set_header Host $host;
    }

    # SSE event stream for the live System Map — must not buffer, long-lived.
    location /stream {
        resolver 10.89.0.1 valid=30s ipv6=off;
        set $bff http://nba-bff:4000;
        proxy_pass $bff;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # static React app (SPA fallback)
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
